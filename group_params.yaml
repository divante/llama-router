# mode: cpu_only | split
#   cpu_only — one preset per model, no -gpu/-cpu suffix, uses "cpu" params
#   split    — two presets per model ({stem}-gpu and {stem}-cpu)
mode: cpu_only

gpu:
  n-gpu-layers: 999
  sleep-idle-seconds: 300
  batch-size: 1024
  ubatch-size: 256

cpu:
  n-gpu-layers: 0
  # kv-offload: off
  batch-size: 512
  ubatch-size: 256
  # threads: 8
  # ctx-size: 32768
  sleep-idle-seconds: 300
